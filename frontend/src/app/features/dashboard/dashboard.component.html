<div class="dashboard-container">

  <header class="main-header">
    <div class="brand">
      <img src="/logo.png" alt="Logo" class="app-logo">
      <h1 class="app-title">Niedziejski Kawalerski</h1>
    </div>

    <div class="user-actions">
      <nav class="top-nav">
        <button class="btn-nav active" routerLink="/dashboard">
          🏠 <span class="nav-text">Dashboard</span>
        </button>
        <button class="btn-nav" routerLink="/admin">
          ⚙️ <span class="nav-text">Ustawienia</span>
        </button>
      </nav>

      <div class="divider"></div>

      <button class="btn-secondary btn-sm btn-logout" (click)="logout()">
        Wyloguj
      </button>
    </div>
  </header>

  <div class="grid-layout">
    <section class="card leagues-panel">
      <h2>Twoje Ligi</h2>

      <div class="league-list">
        @for (liga of leagues; track liga.id) {
          <div class="league-item">
            <div class="league-info">
              <strong>{{ liga.name }}</strong>
            </div>

            <div class="league-actions">
              <span class="status" [class.active]="liga.status === 'ACTIVE'">
                {{ liga.status === 'ACTIVE' ? 'Aktywna' : 'Zakończona' }}
              </span>
              <button class="btn-primary btn-sm" [routerLink]="['/league', liga.id]">Otwórz</button>
            </div>
          </div>
        } @empty {
          <div class="empty-state">
            Nie masz jeszcze żadnych lig. Czas rozpocząć zabawę!
          </div>
        }
      </div>

      <button class="btn-add" (click)="addNewLeague()">+ Dodaj nową ligę</button>
    </section>

    <section class="card recent-panel">
      <h2>Ostatnia Aktywność</h2>
      <ul class="recent-list">
        <li>
<!--          <span class="action-text"><strong>Wkrótce...</strong> </span>-->
<!--          <span class="time">2 min temu</span>-->
      </ul>
    </section>
  </div>

</div>

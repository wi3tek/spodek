spring:
  application:
    name: spodek
  profiles:
    active: dev

---
spring:
  config:
    activate:
      on-profile: dev
  data:
    mongodb:
      # Rozbijamy to, żeby Spring nie miał wątpliwości
      host: localhost
      port: 27017
      database: spodek_dev
server:
  port: 8999

---
spring:
  config:
    activate:
      on-profile: prod
  data:
    mongodb:
      uri: ${MONGO_URI} # Tu w produkcji (Atlas) baza jest zaszyta w URI
server:
  port: ${PORT:8080}
spring:
  application:
    name: spodek
  profiles:
    active: dev

---
spring:
  config:
    activate:
      on-profile: dev
  data:
    mongodb:
      host: localhost
      port: 27017
      database: spodek_dev
server:
  port: 8999
app:
  admin:
    email: ${ADMIN_EMAIL:dev@spodek.local}
    password: ${ADMIN_PASSWORD:DevSpodekStart2026!}

---
spring:
  config:
    activate:
      on-profile: prod
  data:
    mongodb:
      uri: ${MONGO_URI}
server:
  port: ${PORT:8080}
app:
  admin:
    email: ${ADMIN_EMAIL}
    password: ${ADMIN_PASSWORD}